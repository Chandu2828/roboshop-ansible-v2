  - name: get the password from AWS secrets manager
    debug:
    msg: "{{ lookup('amazon.aws.aws-secret', 'roboshop/mysql_root_password', region='us-east-1') }}"
  - name: install mysql server
    package:
      name: mysql-server
      state: present
  - name: start and enable mysql server
    service:
      name: mysqld
      state: started
      enabled: yes
  - name: setup root password 
    command: mysql_secure_installation --set-root-pass "{{ MYSQL_ROOT_PASSWORD }}"
